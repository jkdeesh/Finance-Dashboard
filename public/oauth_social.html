<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Authentication</title>
  <!-- Load Tailwind CSS via CDN for standalone simplicity -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-[#f3f4f6] flex items-center justify-center min-h-screen p-4 antialiased">
  
  <div id="auth-card" class="w-full max-w-[440px] bg-white rounded-2xl shadow-[0_12px_40px_rgba(0,0,0,0.08)] border border-gray-150 p-8 flex flex-col justify-between min-h-[500px] transition-all duration-300">
    
    <!-- Top Brand Header -->
    <div class="flex flex-col items-center text-center">
      <!-- Dynamic Provider Logo -->
      <div id="provider-logo-container" class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-sm border mb-4">
        <!-- SVG injected by JS -->
      </div>
      
      <h2 id="title" class="text-xl font-display font-bold text-gray-800 tracking-tight">
        Sign in with Google
      </h2>
      <p id="subtitle" class="text-xs text-gray-500 mt-1">
        to continue to Asset Tracker
      </p>
    </div>

    <!-- Active Form View -->
    <div class="my-6 flex-1 flex flex-col justify-center">
      
      <!-- Account Selection View (For Google-style login) -->
      <div id="account-selection" class="space-y-3">
        <p class="text-xs font-semibold text-gray-600 mb-2">Choose an account</p>
        
        <button onclick="selectAccount('jagadeesh.srmuniv@gmail.com', 'Jagadeesh')" class="w-full flex items-center justify-between p-3.5 hover:bg-gray-50 border border-gray-100 rounded-xl transition-all text-left">
          <div class="flex items-center gap-3">
            <div id="avatar-primary" class="w-9 h-9 rounded-full bg-indigo-600 text-white font-bold flex items-center justify-center text-sm">
              J
            </div>
            <div>
              <span class="text-xs font-bold text-gray-800 block">Jagadeesh</span>
              <span class="text-[10px] text-gray-500 block">jagadeesh.srmuniv@gmail.com</span>
            </div>
          </div>
          <span class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-2 py-0.5 rounded-full">Owner</span>
        </button>

        <button onclick="selectAccount('guest.user@example.com', 'Guest Member')" class="w-full flex items-center justify-between p-3.5 hover:bg-gray-50 border border-gray-100 rounded-xl transition-all text-left">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-emerald-600 text-white font-bold flex items-center justify-center text-sm">
              G
            </div>
            <div>
              <span class="text-xs font-bold text-gray-800 block">Guest Member</span>
              <span class="text-[10px] text-gray-500 block">guest.user@example.com</span>
            </div>
          </div>
        </button>

        <button onclick="showCustomForm()" class="w-full flex items-center gap-3 p-3.5 hover:bg-gray-50 border border-dashed border-gray-300 rounded-xl transition-all text-left group">
          <div class="w-9 h-9 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center transition-all group-hover:bg-indigo-50 group-hover:text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </div>
          <div>
            <span class="text-xs font-bold text-gray-700 group-hover:text-indigo-600 transition-colors">Use another account</span>
            <span class="text-[10px] text-gray-400 block">Enter custom sign-in email</span>
          </div>
        </button>
      </div>

      <!-- Custom Form View -->
      <form id="custom-form" onsubmit="handleCustomSubmit(event)" class="hidden space-y-4">
        <div>
          <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Email Address</label>
          <input id="custom-email" type="email" required placeholder="name@example.com" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium">
        </div>
        <div>
          <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Full Name</label>
          <input id="custom-name" type="text" required placeholder="Your Name" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium">
        </div>
        <div id="password-field-container">
          <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-1">Password</label>
          <input id="custom-password" type="password" required placeholder="••••••••" value="password" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium">
        </div>

        <div class="flex gap-2 pt-2">
          <button type="button" onclick="hideCustomForm()" class="flex-1 py-2.5 border border-gray-250 text-gray-600 text-xs font-bold rounded-xl hover:bg-gray-50 transition-all">
            Back
          </button>
          <button id="submit-btn" type="submit" class="flex-grow py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-xl transition-all shadow-md">
            Continue
          </button>
        </div>
      </form>
    </div>

    <!-- Footer Security Notice -->
    <div class="border-t border-gray-100 pt-4 text-center">
      <p id="footer-text" class="text-[10px] text-gray-400 font-medium">
        Secure authentication proxy powered by OAuth 2.0. Your credentials are fully protected.
      </p>
    </div>

  </div>

  <script>
    // Parse Provider from URL Query
    const urlParams = new URLSearchParams(window.location.search);
    const provider = urlParams.get('provider') || 'Google';
    
    // UI elements
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const logoContainer = document.getElementById('provider-logo-container');
    const authCard = document.getElementById('auth-card');
    const accountSelection = document.getElementById('account-selection');
    const customForm = document.getElementById('custom-form');
    const submitBtn = document.getElementById('submit-btn');

    // SVGs for social brands
    const LOGOS = {
      Google: {
        bg: 'bg-white border-gray-200/80',
        svg: `<svg viewBox="0 0 24 24" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>`
      },
      Apple: {
        bg: 'bg-black border-black',
        svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.51-.64.74-1.2 1.88-1.05 2.99 1.11.09 2.24-.55 3-1.44z"/>
        </svg>`
      },
      Facebook: {
        bg: 'bg-[#1877F2] border-[#1877F2]',
        svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>`
      }
    };

    // Initialize Provider Styling
    const brand = LOGOS[provider] || LOGOS.Google;
    titleEl.textContent = `Sign in with ${provider}`;
    logoContainer.className = `w-14 h-14 rounded-2xl flex items-center justify-center shadow-sm border mb-4 ${brand.bg}`;
    logoContainer.innerHTML = brand.svg;

    if (provider === 'Apple') {
      authCard.classList.add('border-black/5');
      submitBtn.className = "flex-grow py-2.5 bg-black hover:bg-gray-900 text-white text-xs font-bold rounded-xl transition-all shadow-md";
    } else if (provider === 'Facebook') {
      submitBtn.className = "flex-grow py-2.5 bg-[#1877F2] hover:bg-[#166fe5] text-white text-xs font-bold rounded-xl transition-all shadow-md";
    }

    // Set Apple / FB to display custom form automatically (Google usually has account picker first)
    if (provider === 'Apple' || provider === 'Facebook') {
      showCustomForm();
    }

    function selectAccount(email, name) {
      sendAuthSuccess(email, name);
    }

    function showCustomForm() {
      accountSelection.classList.add('hidden');
      customForm.classList.remove('hidden');
    }

    function hideCustomForm() {
      // If Apple or FB, we don't have account picker, so don't allow backing to it
      if (provider === 'Apple' || provider === 'Facebook') {
        window.close();
        return;
      }
      accountSelection.classList.remove('hidden');
      customForm.classList.add('hidden');
    }

    function handleCustomSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('custom-email').value.trim();
      const name = document.getElementById('custom-name').value.trim();
      if (email && name) {
        sendAuthSuccess(email, name);
      }
    }

    function sendAuthSuccess(email, name) {
      // Communicate back to original app window
      if (window.opener) {
        window.opener.postMessage({
          type: 'OAUTH_AUTH_SUCCESS',
          provider: provider,
          email: email.toLowerCase(),
          name: name
        }, '*');
        
        // Show success animation state
        authCard.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center text-center py-8">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4 animate-bounce">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-800">Authorization Successful</h3>
            <p class="text-xs text-gray-500 mt-2">Connecting you securely with ${provider}...</p>
            <p class="text-[10px] text-indigo-600 font-semibold mt-4">Closing window in 1 second</p>
          </div>
        `;
        setTimeout(() => {
          window.close();
        }, 1100);
      } else {
        alert('Opener window not found. This popup must be opened by the app.');
      }
    }
  </script>
</body>
</html>
